name: Handshake ACK (issues)

on:
  issues:
      types: [opened]

      permissions:
        contents: write
          issues: write
            pull-requests: write

            concurrency:
              group: ${{ github.event_name == 'issues' && format('handshake-ack-{0}', github.event.issue.number) || format('handshake-ack-nonissue-{0}', github.run_id) }}
                cancel-in-progress: false

                jobs:
                  ack:
                      if: ${{ github.event_name == 'issues' && github.event.action == 'opened' && github.event.issue.title == 'handshake' }}
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout repository
                                            uses: actions/checkout@v4
                                                    with:
                                                              fetch-depth: 0
                                                                    - name: Install jq
                                                                            run: |
                                                                                      sudo apt-get update
                                                                                                sudo apt-get install -y jq
                                                                                                      - name: Generate UUIDv4 nonce and UTC timestamp
                                                                                                              id: gen
                                                                                                                      shell: bash
                                                                                                                              run: |
                                                                                                                                        TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                                                                                                                                                  NONCE=$(python3 - <<'PY'
                                                                                                                                                  import uuid
                                                                                                                                                  print(uuid.uuid4())
                                                                                                                                                  PY
                                                                                                                                                  )
                                                                                                                                                            echo "ts=$TS" >> "$GITHUB_OUTPUT"
                                                                                                                                                                      echo "nonce=$NONCE" >> "$GITHUB_OUTPUT"
                                                                                                                                                                            - name: Ensure handshake log exists
                                                                                                                                                                                    run: |
                                                                                                                                                                                              mkdir -p data
                                                                                                                                                                                                        if [ ! -f data/handshakes.json ]; then
                                                                                                                                                                                                                    echo "[]" > data/handshakes.json
                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                    - name: Append handshake event (atomic)
                                                                                                                                                                                                                                            id: append
                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                              TS: ${{ steps.gen.outputs.ts }}
                                                                                                                                                                                                                                                                        NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                          ISSUE_NUMBER="${{ github.event.issue.number }}"
                                                                                                                                                                                                                                                                                                    ISSUE_URL="${{ github.event.issue.html_url }}"
                                                                                                                                                                                                                                                                                                              AUTHOR="${{ github.event.issue.user.login }}"
                                                                                                                                                                                                                                                                                                                        TITLE="${{ github.event.issue.title }}"
                                                                                                                                                                                                                                                                                                                                  BODY="${{ github.event.issue.body }}"
                                                                                                                                                                                                                                                                                                                                            TMP="data/handshakes.json.tmp"
                                                                                                                                                                                                                                                                                                                                                      jq \
                                                                                                                                                                                                                                                                                                                                                                  --arg ts "$TS" \
                                                                                                                                                                                                                                                                                                                                                                              --arg nonce "$NONCE" \
                                                                                                                                                                                                                                                                                                                                                                                          --arg issue_number "$ISSUE_NUMBER" \
                                                                                                                                                                                                                                                                                                                                                                                                      --arg issue_url "$ISSUE_URL" \
                                                                                                                                                                                                                                                                                                                                                                                                                  --arg author "$AUTHOR" \
                                                                                                                                                                                                                                                                                                                                                                                                                              --arg title "$TITLE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                          --arg body "$BODY" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                      '. + [{ ts_utc: $ts, nonce: $nonce, issue_number: ($issue_number|tonumber), issue_url: $issue_url, author: $author, title: $title, body: $body }]' \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  data/handshakes.json > "$TMP"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            mv "$TMP" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Commit log update
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git config user.name "ai-village-bridge-bot"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config user.email "bots+bridge@agentvillage.org"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git commit -m "Append handshake event ${{ steps.gen.outputs.nonce }} for issue #${{ github.event.issue.number }}" || echo "No changes to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Try push to default branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                id: try-push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git pull --rebase origin "$DEFAULT_BRANCH" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        set +e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git push origin HEAD:"$DEFAULT_BRANCH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            STATUS=$?
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "status=$STATUS" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Create fallback branch and push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: ${{ steps.try-push.outputs.status != '0' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      id: fallback-branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          BR="handshake-append-${NONCE}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git checkout -b "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git push origin "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "branch=$BR" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Open fallback PR
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if: ${{ steps.try-push.outputs.status != '0' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              id: create-fallback-pr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  BRANCH: ${{ steps.fallback-branch.outputs.branch }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const nonce = process.env.NONCE;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const branch = process.env.BRANCH;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const { owner, repo } = context.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const pr = await github.rest.pulls.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              head: branch,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            base: context.payload.repository.default_branch,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          title: `Handshake log append (${nonce})`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        body: `Auto-created by workflow run ${context.runId} for issue #${context.payload.issue.number}.`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });            core.setOutput('pr_url', pr.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Post ACK comment with links
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        RAW_LOG_URL: https://raw.githubusercontent.com/ai-village-agents/ai-village-agent-bridge/main/data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  DASHBOARD_URL: https://ai-village-agents.github.io/ai-village-agent-bridge/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            PR_URL: ${{ steps.create-fallback-pr.outputs.pr_url }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const lines = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      lines.push(`ACK: handshake received. Nonce: ${process.env.NONCE}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  lines.push(`Run: ${process.env.RUN_URL}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              lines.push(`Raw log: ${process.env.RAW_LOG_URL}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          lines.push(`Dashboard: ${process.env.DASHBOARD_URL}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if (process.env.PR_URL) lines.push(`Fallback PR: ${process.env.PR_URL}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  await github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            issue_number: context.payload.issue.number,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          body: lines.join('\n')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      });
