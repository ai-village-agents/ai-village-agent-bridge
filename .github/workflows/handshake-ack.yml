name: Handshake ACK (issues)

on:
  issues:
      types: [opened]

      permissions:
        contents: write
          issues: write
            pull-requests: write

            concurrency:
              group: handshake-ack-${{ github.event.issue.number }}
                cancel-in-progress: false

                jobs:
                  ack:
                      if: ${{ github.event.issue.title == 'handshake' }}
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout repository
                                            uses: actions/checkout@v4
                                                    with:
                                                              fetch-depth: 0

                                                                    - name: Install jq
                                                                            run: |
                                                                                      sudo apt-get update
                                                                                                sudo apt-get install -y jq

                                                                                                      - name: Generate nonce and append to log
                                                                                                              id: gen
                                                                                                                      run: |
                                                                                                                                set -euo pipefail
                                                                                                                                          TS_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                                                                                                                                                    NONCE=$(python3 - <<'PY'
                                                                                                                                                    import uuid; print(uuid.uuid4())
                                                                                                                                                    PY
                                                                                                                                                    )
                                                                                                                                                              echo "nonce=$NONCE" >> $GITHUB_OUTPUT
                                                                                                                                                                        echo "ts=$TS_UTC" >> $GITHUB_OUTPUT
                                                                                                                                                                                  mkdir -p data
                                                                                                                                                                                            [ -f data/handshakes.json ] || echo '[]' > data/handshakes.json
                                                                                                                                                                                                      tmp=$(mktemp)
                                                                                                                                                                                                                jq \
                                                                                                                                                                                                                            --arg ts "$TS_UTC" \
                                                                                                                                                                                                                                        --arg nonce "$NONCE" \
                                                                                                                                                                                                                                                    --argjson num ${{ github.event.issue.number }} \
                                                                                                                                                                                                                                                                --arg url "${{ github.event.issue.html_url }}" \
                                                                                                                                                                                                                                                                            --arg author "${{ github.event.issue.user.login }}" \
                                                                                                                                                                                                                                                                                        '. + [{ts_utc:$ts, nonce:$nonce, issue_number:$num, issue_url:$url, author:$author}]' \
                                                                                                                                                                                                                                                                                                    data/handshakes.json > "$tmp"
                                                                                                                                                                                                                                                                                                              mv "$tmp" data/handshakes.json
                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                    - name: Commit changes
                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                      set -euo pipefail
                                                                                                                                                                                                                                                                                                                                                git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                    git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                              git commit -m "append: handshake ${{ steps.gen.outputs.nonce }} from issue #${{ github.event.issue.number }}" || echo "No changes"
                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                    - name: Try direct push to default branch
                                                                                                                                                                                                                                                                                                                                                                                            id: push
                                                                                                                                                                                                                                                                                                                                                                                                    continue-on-error: true
                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                      git push origin HEAD:${{ github.event.repository.default_branch }}
                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Create fallback branch and push
                                                                                                                                                                                                                                                                                                                                                                                                                                    id: fb
                                                                                                                                                                                                                                                                                                                                                                                                                                            if: steps.push.outcome == 'failure'
                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                              BR=handshake-append-${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git checkout -b "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git push origin "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "branch=$BR" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Open fallback PR
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          id: cpr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if: steps.push.outcome == 'failure'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const {owner, repo} = context.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const base = '${{ github.event.repository.default_branch }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const head = '${{ steps.fb.outputs.branch }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const title = `Append handshake ${{ steps.gen.outputs.nonce }}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const body = `Automated append from issue #${{ github.event.issue.number }}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const pr = await github.rest.pulls.create({owner, repo, base, head, title, body});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                core.setOutput('url', pr.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Post ACK comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const nonce = `${{ steps.gen.outputs.nonce }}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const rawLog = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${{ github.event.repository.default_branch }}/data/handshakes.json`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const dash = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const prUrl = `${{ steps.cpr.outputs.url || '' }}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let body = `ACK: handshake received. Nonce: ${nonce}.` + `\n- Run: ${runUrl}` + `\n- Log: ${rawLog}` + `\n- Dashboard: ${dash}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (prUrl) body += `\n- Fallback PR: ${prUrl}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                await github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          issue_number: context.issue.number,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        body
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
