name: Handshake ACK

on:
  issues:
      types: [opened]

      permissions:
        contents: write
          issues: write
            pull-requests: write

            jobs:
              ack:
                  if: ${{ github.event_name == 'issues' && github.event.action == 'opened' && github.event.issue.title == 'handshake' }}
                      runs-on: ubuntu-latest
                          concurrency:
                                group: ${{ format('handshake-ack-{0}', github.event.issue.number) }}
                                      cancel-in-progress: false
                                          steps:
                                                - name: Checkout
                                                        uses: actions/checkout@v4
                                                                with:
                                                                          fetch-depth: 0

                                                                                - name: Install jq
                                                                                        run: sudo apt-get update && sudo apt-get install -y jq

                                                                                              - name: Generate nonce and timestamp
                                                                                                      id: gen
                                                                                                              shell: bash
                                                                                                                      run: |
                                                                                                                                NONCE=$(python - <<'PY'
                                                                                                                                import uuid
                                                                                                                                print(uuid.uuid4())
                                                                                                                                PY
                                                                                                                                )
                                                                                                                                          TS_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                                                                                                                                                    echo "nonce=$NONCE" >> $GITHUB_OUTPUT
                                                                                                                                                              echo "ts_utc=$TS_UTC" >> $GITHUB_OUTPUT
                                                                                                                                                              
                                                                                                                                                                    - name: Prepare handshakes.json
                                                                                                                                                                            id: prep
                                                                                                                                                                                    shell: bash
                                                                                                                                                                                            env:
                                                                                                                                                                                                      ISSUE_NUMBER: ${{ github.event.issue.number }}
                                                                                                                                                                                                                ISSUE_URL: ${{ github.event.issue.html_url }}
                                                                                                                                                                                                                          ISSUE_TITLE: ${{ github.event.issue.title }}
                                                                                                                                                                                                                                    ISSUE_BODY: ${{ github.event.issue.body }}
                                                                                                                                                                                                                                              ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
                                                                                                                                                                                                                                                        TS_UTC: ${{ steps.gen.outputs.ts_utc }}
                                                                                                                                                                                                                                                                  NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                    mkdir -p data
                                                                                                                                                                                                                                                                                              if [ ! -f data/handshakes.json ]; then
                                                                                                                                                                                                                                                                                                          echo "[]" > data/handshakes.json
                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                              tmp=$(mktemp)
                                                                                                                                                                                                                                                                                                                                        jq --arg ts "$TS_UTC" --arg nonce "$NONCE" \
                                                                                                                                                                                                                                                                                                                                                     --arg num "${ISSUE_NUMBER}" --arg url "$ISSUE_URL" \
                                                                                                                                                                                                                                                                                                                                                                  --arg author "$ISSUE_AUTHOR" --arg title "$ISSUE_TITLE" --arg body "$ISSUE_BODY" \
                                                                                                                                                                                                                                                                                                                                                                               '. + [{ts_utc:$ts, nonce:$nonce, issue_number: ($num|tonumber), issue_url:$url, author:$author, title:$title, body:$body}]' \
                                                                                                                                                                                                                                                                                                                                                                                            data/handshakes.json > "$tmp"
                                                                                                                                                                                                                                                                                                                                                                                                      mv "$tmp" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                            - name: Commit and attempt push
                                                                                                                                                                                                                                                                                                                                                                                                                    id: push
                                                                                                                                                                                                                                                                                                                                                                                                                            shell: bash
                                                                                                                                                                                                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                                                                                                                                                                                                              NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                        TS_UTC: ${{ steps.gen.outputs.ts_utc }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git commit -m "handshake: append ${NONCE} for issue #${ISSUE_NUMBER} at ${TS_UTC}" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git pull --rebase origin "$DEFAULT_BRANCH" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if git push origin HEAD:"$DEFAULT_BRANCH"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "pushed=true" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "pushed=false" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Create fallback branch and push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if: steps.push.outputs.pushed == 'false'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  id: fb
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          shell: bash
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              BR="handshake-append-${NONCE}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git checkout -b "$BR" || git checkout "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git push origin HEAD:"$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "branch=$BR" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Open PR for fallback branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if: steps.push.outputs.pushed == 'false'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  id: pr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const owner = context.repo.owner;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const repo = context.repo.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const head = '${{ steps.fb.outputs.branch }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const base = '${{ github.event.repository.default_branch }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const nonce = '${{ steps.gen.outputs.nonce }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const issueNumber = ${{ github.event.issue.number }};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const ts = '${{ steps.gen.outputs.ts_utc }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const title = `handshake: append ${nonce} for issue #${issueNumber}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const body = `Auto-generated fallback PR for handshake append at ${ts}.`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const pr = await github.rest.pulls.create({ owner, repo, head, base, title, body });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          core.setOutput('url', pr.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Post ACK comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const nonce = '${{ steps.gen.outputs.nonce }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const rawLogUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${context.payload.repository.default_branch}/data/handshakes.json`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const dashboardUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const prUrl = '${{ steps.pr.outputs.url }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let lines = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          `ACK: handshake received. nonce=${nonce}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        `run: ${runUrl}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      `log: ${rawLogUrl}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `dashboard: ${dashboardUrl}`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (prUrl && prUrl !== '') lines.push(`fallback_pr: ${prUrl}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  issue_number: context.issue.number,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                body: lines.join('\n')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
