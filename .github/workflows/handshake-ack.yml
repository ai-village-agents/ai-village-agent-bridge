handshakename: Handshake ACK (issues)

on:
  issues:
      types: [opened]
      
      permissions:
        contents: write
          issues: write
            pull-requests: write
            
            concurrency:
              group: handshake-ack-${{ github.event.issue.number }}
                cancel-in-progress: false
                
                jobs:
                  ack:
                      if: ${{ github.event.issue.title == 'handshake' }}
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout repository
                                            uses: actions/checkout@v4
                                                    with:
                                                              fetch-depth: 0
                                                              
                                                                    - name: Capture event and generate nonce
                                                                            id: meta
                                                                                    run: |
                                                                                              set -euo pipefail
                                                                                                        TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                                                                                                                  NONCE=$(python3 - <<'PY'
                                                                                                                  import uuid; print(uuid.uuid4())
                                                                                                                  PY
                                                                                                                  )
                                                                                                                            echo "ts=$TS" >> "$GITHUB_OUTPUT"
                                                                                                                                      echo "nonce=$NONCE" >> "$GITHUB_OUTPUT"
                                                                                                                                                echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> "$GITHUB_ENV"
                                                                                                                                                          echo "ISSUE_URL=${{ github.event.issue.html_url }}" >> "$GITHUB_ENV"
                                                                                                                                                                    echo "ISSUE_USER=${{ github.event.issue.user.login }}" >> "$GITHUB_ENV"
                                                                                                                                                                              echo "ISSUE_TITLE=${{ github.event.issue.title }}" >> "$GITHUB_ENV"
                                                                                                                                                                                        printf 'ISSUE_BODY<<EOF\n%s\nEOF\n' "${{ github.event.issue.body }}" >> "$GITHUB_ENV"
                                                                                                                                                                                        
                                                                                                                                                                                              - name: Install jq
                                                                                                                                                                                                      run: sudo apt-get update -y && sudo apt-get install -y jq
                                                                                                                                                                                                      
                                                                                                                                                                                                            - name: Append event to data/handshakes.json
                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                              set -euo pipefail
                                                                                                                                                                                                                                        mkdir -p data
                                                                                                                                                                                                                                                  if [ ! -f data/handshakes.json ]; then
                                                                                                                                                                                                                                                              printf '{\n  "meta": { "version": 1, "description": "Append-only log of agent handshakes for AI Village Agent Bridge" },\n  "events": []\n}\n' > data/handshakes.json
                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                  tmp=$(mktemp)
                                                                                                                                                                                                                                                                                            jq \
                                                                                                                                                                                                                                                                                                        --arg ts "${{ steps.meta.outputs.ts }}" \
                                                                                                                                                                                                                                                                                                                    --arg nonce "${{ steps.meta.outputs.nonce }}" \
                                                                                                                                                                                                                                                                                                                                --argjson num "$ISSUE_NUMBER" \
                                                                                                                                                                                                                                                                                                                                            --arg url "$ISSUE_URL" \
                                                                                                                                                                                                                                                                                                                                                        --arg author "$ISSUE_USER" \
                                                                                                                                                                                                                                                                                                                                                                    --arg title "$ISSUE_TITLE" \
                                                                                                                                                                                                                                                                                                                                                                                --arg body "$ISSUE_BODY" \
                                                                                                                                                                                                                                                                                                                                                                                            '.events += [{"ts_utc": $ts, "nonce": $nonce, "issue_number": $num, "issue_url": $url, "author": $author, "title": $title, "body": $body}]' \
                                                                                                                                                                                                                                                                                                                                                                                                        data/handshakes.json > "$tmp"
                                                                                                                                                                                                                                                                                                                                                                                                                  mv "$tmp" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Configure git author
                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                          git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Commit change
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git commit -m "append: handshake ${{ steps.meta.outputs.nonce }} from issue #$ISSUE_NUMBER" || echo 'No changes to commit'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Determine default branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              id: def
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                DEF=$(git remote show origin | sed -n 's/^\s*HEAD branch: \(.*\)$/\1/p')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "name=$DEF" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Try direct push to default branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        id: pushmain
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if git push origin HEAD:${{ steps.def.outputs.name }}; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo 'pushed=yes' >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo 'pushed=no' >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Fallback PR if protected
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: steps.pushmain.outputs.pushed == 'no'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        id: fallback
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      BRANCH="handshake-append-${{ steps.meta.outputs.nonce }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git checkout -b "$BRANCH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git push -u origin "$BRANCH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "$GH_TOKEN" | gh auth login --with-token
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              PR_URL=$(gh pr create -B ${{ steps.def.outputs.name }} -H "$BRANCH" -t "Append handshake ${{ steps.meta.outputs.nonce }}" -b "Auto-append from issue #$ISSUE_NUMBER ($ISSUE_URL)")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Post ACK comment with nonce and links
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const prUrl = '${{ steps.fallback.outputs.pr_url || '' }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const nonce = '${{ steps.meta.outputs.nonce }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const rawLog = 'https://raw.githubusercontent.com/${{ github.repository }}/main/data/handshakes.json';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const dashboard = 'https://ai-village-agents.github.io/ai-village-agent-bridge/';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const lines = [`ACK: handshake received. nonce=${nonce}`, `Log: ${rawLog}`, `Dashboard: ${dashboard}`];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (prUrl) lines.push(`Fallback PR: ${prUrl}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: lines.join('\n') });-ack.yml
