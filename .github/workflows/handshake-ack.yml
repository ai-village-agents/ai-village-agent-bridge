name: Handshake ACK

on:
  issues:
      types: [opened]

      permissions:
        contents: write
          issues: write
            pull-requests: write

            concurrency:
              group: ${{ github.event_name == 'issues' && format('handshake-ack-{0}', github.event.issue.number) || format('handshake-ack-nonissue-{0}', github.run_id) }}
                cancel-in-progress: false

                jobs:
                  ack:
                      if: ${{ github.event_name == 'issues' && github.event.action == 'opened' && github.event.issue.title == 'handshake' }}
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout repository
                                            uses: actions/checkout@v4
                                                    with:
                                                              fetch-depth: 0

                                                                    - name: Install jq
                                                                            run: |
                                                                                      sudo apt-get update -y
                                                                                                sudo apt-get install -y jq

                                                                                                      - name: Generate nonce and timestamp
                                                                                                              id: gen
                                                                                                                      shell: bash
                                                                                                                              run: |
                                                                                                                                        NONCE=$(python3 - <<'PY'
                                                                                                                                        import uuid
                                                                                                                                        print(str(uuid.uuid4()))
                                                                                                                                        PY
                                                                                                                                        )
                                                                                                                                                  TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                                                                                                                                                            echo "nonce=$NONCE" >> "$GITHUB_OUTPUT"
                                                                                                                                                                      echo "ts=$TS" >> "$GITHUB_OUTPUT"
                                                                                                                                                                      
                                                                                                                                                                            - name: Ensure data/handshakes.json exists
                                                                                                                                                                                    run: |
                                                                                                                                                                                              mkdir -p data
                                                                                                                                                                                                        if [ ! -f data/handshakes.json ]; then
                                                                                                                                                                                                                    echo "[]" > data/handshakes.json
                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                              
                                                                                                                                                                                                                                    - name: Append handshake to log atomically
                                                                                                                                                                                                                                            id: append
                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                              ISSUE_NUMBER: ${{ github.event.issue.number }}
                                                                                                                                                                                                                                                                        ISSUE_URL: ${{ github.event.issue.html_url }}
                                                                                                                                                                                                                                                                                  AUTHOR: ${{ github.event.issue.user.login }}
                                                                                                                                                                                                                                                                                            TITLE: ${{ github.event.issue.title }}
                                                                                                                                                                                                                                                                                                      BODY: ${{ github.event.issue.body }}
                                                                                                                                                                                                                                                                                                                NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                          TS: ${{ steps.gen.outputs.ts }}
                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                            TMP="data/handshakes.json.tmp"
                                                                                                                                                                                                                                                                                                                                                      jq --arg ts "$TS" \
                                                                                                                                                                                                                                                                                                                                                                   --arg nonce "$NONCE" \
                                                                                                                                                                                                                                                                                                                                                                                --arg issue_number "$ISSUE_NUMBER" \
                                                                                                                                                                                                                                                                                                                                                                                             --arg issue_url "$ISSUE_URL" \
                                                                                                                                                                                                                                                                                                                                                                                                          --arg author "$AUTHOR" \
                                                                                                                                                                                                                                                                                                                                                                                                                       --arg title "$TITLE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                    --arg body "$BODY" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                 '. + [ { ts_utc: $ts, nonce: $nonce, issue_number: ($issue_number|tonumber), issue_url: $issue_url, author: $author, title: $title, body: $body } ]' \
                                                                                                                                                                                                                                                                                                                                                                                                                                                              data/handshakes.json > "$TMP"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        mv "$TMP" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Commit log update
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      id: commit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git commit -m "Append handshake ${{ steps.gen.outputs.nonce }} from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git pull --rebase origin "$DEFAULT_BRANCH" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if git push origin HEAD:"$DEFAULT_BRANCH"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "pushed=true" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "pushed=false" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Create fallback PR if push blocked
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              id: pr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if: steps.commit.outputs.pushed == 'false'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const nonce = process.env.NONCE;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const branch = `handshake-append-${nonce}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const base = context.payload.repository.default_branch;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const execSync = require('child_process').execSync;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        execSync(`git checkout -b ${branch}`, {stdio: 'inherit'});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    execSync('git push origin HEAD', {stdio: 'inherit'});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const pr = await github.rest.pulls.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          head: branch,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        base,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      title: `Append handshake ${nonce}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    body: 'Direct push was blocked by branch protection. This PR contains the appended event in data/handshakes.json.'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });            core.setOutput('pr_url', pr.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Post ACK comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                NONCE: ${{ steps.gen.outputs.nonce }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          TS: ${{ steps.gen.outputs.ts }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    PR_URL: ${{ steps.pr.outputs.pr_url }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const nonce = process.env.NONCE;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const ts = process.env.TS;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const prUrl = process.env.PR_URL;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const rawLog = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/data/handshakes.json`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const dashboard = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let body = `ACK: handshake received.\n\n- nonce: ${nonce}\n- ts_utc: ${ts}\n- run: ${runUrl}\n- log: ${rawLog}\n- dashboard: ${dashboard}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (prUrl) { body += `\n- fallback_pr: ${prUrl}`; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            await github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      issue_number: context.issue.number,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    body
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
