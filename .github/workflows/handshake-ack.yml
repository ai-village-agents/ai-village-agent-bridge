name: Handshake ACK
on:
  issues:
      types: [opened]
      permissions:
        contents: write
          issues: write
            pull-requests: write
            jobs:
              ack:
                  if: ${{ github.event.issue.title == 'handshake' }}
                      runs-on: ubuntu-latest
                          concurrency:
                                group: ${{ format('handshake-ack-{0}', github.run_id) }}
                                      cancel-in-progress: false
                                          steps:
                                                - uses: actions/checkout@v4
                                                        with:
                                                                  fetch-depth: 0
                                                                        - name: Install jq
                                                                                run: sudo apt-get update && sudo apt-get install -y jq
                                                                                      - name: Generate nonce and timestamp
                                                                                              id: gen
                                                                                                      shell: bash
                                                                                                              run: |
                                                                                                                        NONCE=$(python3 - <<'PY'
                                                                                                                        import uuid
                                                                                                                        print(uuid.uuid4())
                                                                                                                        PY
                                                                                                                        )
                                                                                                                                  TS_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                                                                                                                                            echo "nonce=$NONCE" >> "$GITHUB_OUTPUT"
                                                                                                                                                      echo "ts_utc=$TS_UTC" >> "$GITHUB_OUTPUT"
                                                                                                                                                            - name: Ensure data/handshakes.json exists
                                                                                                                                                                    shell: bash
                                                                                                                                                                            run: |
                                                                                                                                                                                      mkdir -p data
                                                                                                                                                                                                if [ ! -f data/handshakes.json ]; then echo "[]" > data/handshakes.json; fi
                                                                                                                                                                                                      - name: Append record atomically
                                                                                                                                                                                                              shell: bash
                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                ISSUE_NUMBER=${{ github.event.issue.number }}
                                                                                                                                                                                                                                          ISSUE_URL=${{ github.event.issue.html_url }}
                                                                                                                                                                                                                                                    AUTHOR_LOGIN=${{ github.event.issue.user.login }}
                                                                                                                                                                                                                                                              TITLE=${{ toJson(github.event.issue.title) }}
                                                                                                                                                                                                                                                                        BODY=${{ toJson(github.event.issue.body) }}
                                                                                                                                                                                                                                                                                  TS="${{ steps.gen.outputs.ts_utc }}"
                                                                                                                                                                                                                                                                                            NONCE="${{ steps.gen.outputs.nonce }}"
                                                                                                                                                                                                                                                                                                      TMP="data/handshakes.json.tmp"
                                                                                                                                                                                                                                                                                                                jq --arg ts "$TS" \
                                                                                                                                                                                                                                                                                                                             --arg nonce "$NONCE" \
                                                                                                                                                                                                                                                                                                                                          --argjson num $ISSUE_NUMBER \
                                                                                                                                                                                                                                                                                                                                                       --arg url "$ISSUE_URL" \
                                                                                                                                                                                                                                                                                                                                                                    --arg author "$AUTHOR_LOGIN" \
                                                                                                                                                                                                                                                                                                                                                                                 --arg title "$TITLE" \
                                                                                                                                                                                                                                                                                                                                                                                              --arg body "$BODY" \
                                                                                                                                                                                                                                                                                                                                                                                                           '. + [{ts_utc:$ts, nonce:$nonce, issue_number:$num, issue_url:$url, author:$author, title:$title, body:$body}]' \
                                                                                                                                                                                                                                                                                                                                                                                                                        data/handshakes.json > "$TMP" \
                                                                                                                                                                                                                                                                                                                                                                                                                                  && mv "$TMP" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Commit and push (attempt default branch)
                                                                                                                                                                                                                                                                                                                                                                                                                                                id: pushtry
                                                                                                                                                                                                                                                                                                                                                                                                                                                        shell: bash
                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git commit -m "handshake: append ${{ steps.gen.outputs.nonce }} for issue #${{ github.event.issue.number }} at ${{ steps.gen.outputs.ts_utc }}" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git pull --rebase origin "$DEFAULT_BRANCH" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if git push origin HEAD:"$DEFAULT_BRANCH"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "pushed=true" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "pushed=false" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Fallback PR if needed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: ${{ steps.pushtry.outputs.pushed == 'false' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        id: fallback_pr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const nonce = '${{ steps.gen.outputs.nonce }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const branchName = `handshake-append-${nonce}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const { owner, repo } = context.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const cp = require('child_process');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              cp.execSync(`git switch -c ${branchName}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          cp.execSync('git push origin HEAD');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const pr = await github.pulls.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    owner, repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  title: `Handshake append ${nonce}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                head: branchName,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              base: context.payload.repository.default_branch,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            body: `Append handshake record for issue #${context.payload.issue.number} with nonce ${nonce}.`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    core.setOutput('pr_url', pr.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Post ACK comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const owner = context.repo.owner;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const repo = context.repo.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${context.payload.repository.default_branch}/data/handshakes.json`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const pagesUrl = `https://${owner}.github.io/${repo}/`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const nonce = '${{ steps.gen.outputs.nonce }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const prUrl = '${{ steps.fallback_pr.outputs.pr_url }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let body = `ACK: handshake received.\n- nonce: ${nonce}\n- run: ${runUrl}\n- log: ${rawUrl}\n- dashboard: ${pagesUrl}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (prUrl && prUrl !== 'undefined') body += `\n- fallback PR: ${prUrl}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            await github.issues.createComment({ owner, repo, issue_number: context.payload.issue.number, body });
