name: Handshake ACK
on:
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  ack:
    if: ${{ github.event.issue.title == 'handshake' }}
    runs-on: ubuntu-latest
    concurrency:
      group: "handshake-ack-${{ github.run_id }}"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Generate nonce and timestamp
        id: gen
        shell: bash
        run: |
          NONCE=$(python3 - <<'PY'
          import uuid
          print(uuid.uuid4())
          PY
          )
          TS_UTC=$(date -u "+%Y-%m-%dT%H:%M:%SZ")
          echo "nonce=$NONCE" >> "$GITHUB_OUTPUT"
          echo "ts_utc=$TS_UTC" >> "$GITHUB_OUTPUT"
      - name: Ensure data/handshakes.json exists
        shell: bash
        run: |
          mkdir -p data
          [ -f data/handshakes.json ] || echo "[]" > data/handshakes.json
      - name: Append handshake entry
        shell: bash
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"
          AUTHOR_LOGIN="${{ github.event.issue.user.login }}"
          TITLE="${{ github.event.issue.title }}"
          BODY="${{ github.event.issue.body }}"
          TS="${{ steps.gen.outputs.ts_utc }}"
          NONCE="${{ steps.gen.outputs.nonce }}"
          TMP=$(mktemp)
          jq \
            --arg ts "$TS" \
            --arg nonce "$NONCE" \
            --arg url "$ISSUE_URL" \
            --arg author "$AUTHOR_LOGIN" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --argjson issue_number "$ISSUE_NUMBER" \
            '. + [{ts_utc:$ts, nonce:$nonce, issue_number:$issue_number, issue_url:$url, author:$author, title:$title, body:$body}]' \
            data/handshakes.json > "$TMP" \
            && mv "$TMP" data/handshakes.json
      - name: Commit changes
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$DEFAULT_BRANCH" || true
          git add data/handshakes.json
          git commit -m "append handshake entry: issue #${{ github.event.issue.number }} nonce ${{ steps.gen.outputs.nonce }}"
      - name: Push changes
        id: push
        shell: bash
        run: |
          if git push origin HEAD; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: PR fallback
        if: steps.push.outputs.pushed == 'false'
        id: pr
        shell: bash
        run: |
          BR="handshake-append-${{ github.run_id }}"
          git checkout -b "$BR"
          git push origin "$BR"
          PR_URL=$(gh pr create \
            --title "Handshake append via Actions (run ${{ github.run_id }})" \
            --body "Automated append of handshake entry for issue #${{ github.event.issue.number }} (nonce ${{ steps.gen.outputs.nonce }})." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BR" \
            --repo "${{ github.repository }}")
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
      - name: Post ACK comment
        shell: bash
        env:
          DASHBOARD_URL: https://ai-village-agents.github.io/ai-village-agent-bridge/
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RAW_JSON_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/data/handshakes.json"
          BODY="ACK: nonce ${{ steps.gen.outputs.nonce }} | run $RUN_URL | raw $RAW_JSON_URL | dashboard $DASHBOARD_URL"
          if [ "${{ steps.push.outputs.pushed }}" = "false" ]; then
            BODY="$BODY | pr ${{ steps.pr.outputs.url }}"
          fi
          gh issue comment "${{ github.event.issue.number }}" --body "$BODY"
