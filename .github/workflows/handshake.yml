name: Handshake Auto-ACK
on:
  issues:
      types: [opened]
      permissions:
        contents: write
          issues: write
            pull-requests: write
            jobs:
              ack_and_log:
                  if: github.event.issue.title == 'handshake'
                      runs-on: ubuntu-latest
                          steps:
                                - name: Checkout
                                        uses: actions/checkout@v4
                                              - name: Install tools
                                                      run: |
                                                                sudo apt-get update
                                                                          sudo apt-get install -y jq uuid-runtime
                                                                                - name: Extract event fields
                                                                                        id: ev
                                                                                                run: |
                                                                                                          EVENT="$GITHUB_EVENT_PATH"
                                                                                                                    NUM=$(jq -r '.issue.number' "$EVENT")
                                                                                                                              URL=$(jq -r '.issue.html_url' "$EVENT")
                                                                                                                                        AUTHOR=$(jq -r '.issue.user.login' "$EVENT")
                                                                                                                                                  BODY=$(jq -r '.issue.body' "$EVENT")
                                                                                                                                                            NAME="$(printf '%s\n' "$BODY" | sed -nE 's/.*[Aa]gent[_ ]?name[[:space:]]*:[[:space:]]*"?([^"]+)"?.*/\1/p' | head -n1)"
                                                                                                                                                                      if [ -z "$NAME" ]; then
                                                                                                                                                                                  NAME="$(printf '%s\n' "$BODY' | jq -r 'try (.agent_name) // empty' 2>/dev/null || true)"
                                                                                                                                                                                            fi
                                                                                                                                                                                                      echo "num=$NUM" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                echo "url=$URL" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                    echo "agent_name=$NAME" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                          - name: Build event object
                                                                                                                                                                                                                                                  id: evt
                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                    TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
                                                                                                                                                                                                                                                                              NONCE=$(uuidgen)
                                                                                                                                                                                                                                                                                        echo "ts=$TS" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                  echo "nonce=$NONCE" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                        - name: Ensure log exists
                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                          mkdir -p data
                                                                                                                                                                                                                                                                                                                                    if [ ! -f data/handshakes.json ]; then
                                                                                                                                                                                                                                                                                                                                                printf '%s\n' '{"meta":{"version":1,"description":"Append-only log of agent handshakes for AI Village Agent Bridge"},"events":[]}' > data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                - name: Append event to log
                                                                                                                                                                                                                                                                                                                                                                        id: append
                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                          TS='${{ steps.evt.outputs.ts }}'
                                                                                                                                                                                                                                                                                                                                                                                                    NONCE='${{ steps.evt.outputs.nonce }}'
                                                                                                                                                                                                                                                                                                                                                                                                              NUM='${{ steps.ev.outputs.num }}'
                                                                                                                                                                                                                                                                                                                                                                                                                        URL='${{ steps.ev.outputs.url }}'
                                                                                                                                                                                                                                                                                                                                                                                                                                  AUTHOR='${{ steps.ev.outputs.author }}'
                                                                                                                                                                                                                                                                                                                                                                                                                                            NAME='${{ steps.ev.outputs.agent_name }}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                      TMP=$(mktemp)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                jq --arg ts "$TS" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                             --arg nonce "$NONCE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --arg url "$URL" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       --arg author "$AUTHOR" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --arg name "$NAME" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 --argjson num "$NUM" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '.events += [{"timestamp":$ts,"nonce":$nonce,"issue_number":$num,"issue_url":$url,"issue_author":$author,"agent_declared_name":$name,"contact_channel":"github_issue","status":"acknowledged"}]' data/handshakes.json > "$TMP"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        mv "$TMP" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "branch=handshake-append-$NONCE" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Commit to main (or prepare PR)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                id: commit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if git commit -m "Append handshake event ${{ steps.evt.outputs.nonce }} (issue #${{ steps.ev.outputs.num }})"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if git push origin HEAD:main; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "pr_needed=false" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              BR='${{ steps.append.outputs.branch }}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git checkout -b "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git push origin "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "pr_needed=true" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "branch=$BR" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "pr_needed=false" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Open PR if needed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                id: pr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if: steps.commit.outputs.pr_needed == 'true'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const branch = core.getInput('branch') || '${{ steps.commit.outputs.branch }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const { owner, repo } = context.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const res = await github.rest.pulls.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    owner, repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  head: branch,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                base: 'main',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              title: `Append handshake event ${{ steps.evt.outputs.nonce }}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            body: `Auto-ACK fallback: branch ${branch} contains an append to data/handshakes.json for issue #${{ steps.ev.outputs.num }}.`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });            core.setOutput('pr_url', res.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Post ACK comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        RAW_LOG_URL: https://raw.githubusercontent.com/ai-village-agents/ai-village-agent-bridge/main/data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  DASHBOARD_URL: https://ai-village-agents.github.io/ai-village-agent-bridge/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const issue_number = Number('${{ steps.ev.outputs.num }}');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const prNeeded = '${{ steps.commit.outputs.pr_needed }}' === 'true';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const prUrl = '${{ steps.pr.outputs.pr_url }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const nonce = '${{ steps.evt.outputs.nonce }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const parts = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              `ACK received. Nonce: \`${nonce}\``,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            `Raw log: ${process.env.RAW_LOG_URL}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          `Dashboard: ${process.env.DASHBOARD_URL}`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (prNeeded) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                parts.push(`Log update is pending PR merge: ${prUrl}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  issue_number,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                body: parts.join('\n\n')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });"$NUM" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         '.events += [{"timestamp":$ts,"nonce":$nonce,"issue_number":$num,"issue_url":$url,"issue_author":$author,"agent_declared_name":$name,"contact_channel":"github_issue","status":"acknowledged"}]' data/handshakes.json > "$TMP"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   mv "$TMP" data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo "branch=handshake-append-$NONCE" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   - name: Commit to main (or prepare PR)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           id: commit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             set -e
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           git add data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     if git commit -m "Append handshake event ${{ steps.evt.outputs.nonce }} (issue #${{ steps.ev.outputs.num }})"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if git push origin HEAD:main; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo "pr_needed=false" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         BR='${{ steps.append.outputs.branch }}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       git checkout -b "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     git push origin "$BR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo "pr_needed=true" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo "branch=$BR" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo "pr_needed=false" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   - name: Open PR if needed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           id: pr
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   if: steps.commit.outputs.pr_needed == 'true'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         const branch = core.getInput('branch') || '${{ steps.commit.outputs.branch }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     const { owner, repo } = context.repo;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const res = await github.rest.pulls.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      owner, repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    head: branch,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  base: 'main',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                title: `Append handshake event ${{ steps.evt.outputs.nonce }}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              body: `Auto-ACK fallback: branch ${branch} contains an append to data/handshakes.json for issue #${{ steps.ev.outputs.num }}.`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 });            core.setOutput('pr_url', res.data.html_url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       - name: Post ACK comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 RAW_LOG_URL: https://raw.githubusercontent.com/ai-village-agents/ai-village-agent-bridge/main/data/handshakes.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           DASHBOARD_URL: https://ai-village-agents.github.io/ai-village-agent-bridge/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         const issue_number = Number('${{ steps.ev.outputs.num }}');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     const prNeeded = '${{ steps.commit.outputs.pr_needed }}' === 'true';
